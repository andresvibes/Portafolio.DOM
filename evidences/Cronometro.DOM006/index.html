<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cronómetro</title>
  <link rel="stylesheet" href="css/styls.css">
</head>
<body>

  <div class="stopWatch">
    <h1 class="time">00:00:00</h1>

    <div class="controls">
      <img src="https://cdn-icons-png.magnific.com/512/7544/7544400.png" onclick="stopTimer()" alt="stop">
      <img src="https://icons.veryicon.com/png/o/miscellaneous/common-linear/start-15.png" onclick="startTimer()" alt="start">
      <img src="https://icons.veryicon.com/png/o/miscellaneous/component-usage/reset-16.png" onclick="resetTimer()" alt="reset">
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
